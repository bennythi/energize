# Supabase-CLI-Config — Energize Festival 2027
# Doku: https://supabase.com/docs/guides/local-development/cli/config
#
# project_id ist der Slug des Cloud-Projekts und wird per `supabase link --project-ref <ref>`
# einmalig verknüpft. Lokales `supabase start` läuft auch ohne Cloud-Link.

project_id = "energize"

[db]
major_version = 16

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/auth/callback",
  "https://energize-festival.de/auth/callback",
  "https://www.energize-festival.de/auth/callback",
  "https://staging.brainchildz.de/auth/callback",
  "capacitor://localhost/auth/callback",
  "https://localhost/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
# Magic-Link only — kein Passwort-Login
secure_password_change = false

[auth.external.apple]
enabled = false
[auth.external.google]
enabled = false
