<!doctype html>
<html lang="de" class="bg-bg">
  <head>
    <meta charset="utf-8" />
    <!-- Brand-Icon: gelbes Signet auf schwarz, kommt vom 2026er Wix-Build -->
    <link rel="icon" href="%sveltekit.assets%/brand/energize-icon.jpg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/brand/energize-icon.jpg" />

  <body data-sveltekit-preload-data="hover" class="min-h-screen bg-bg text-fg antialiased">
